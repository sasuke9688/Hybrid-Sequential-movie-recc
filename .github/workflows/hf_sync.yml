name: Synchronize Deployment to Hugging Face

on:
  push:
    branches: [main]
  # Trigger this workflow automatically after the matrix retraining finishes
  workflow_run:
    workflows: ["Automated Hybrid Model Retraining", "Fast Live Rating Synchronization"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push Code and Models to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace YOUR_HF_USERNAME and YOUR_SPACE_NAME with your exact Hugging Face details
          git push --force https://YOUR_HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/YOUR_HF_USERNAME/YOUR_SPACE_NAME main
