name: Synchronize Deployment to Hugging Face

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Automated Hybrid Model Retraining", "Fast Live Rating Synchronization"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # We only need the latest files, not the history
          lfs: true
      
      - name: Deploy Clean Snapshot to Hugging Face via LFS
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Preparing clean deployment environment..."
          
          # 1. Destroy the GitHub history in the runner to bypass legacy blob rejection
          rm -rf .git
          
          # 2. Initialize a fresh Git repository specifically for Hugging Face
          git init
          git branch -M main
          
          # 3. Configure Git LFS and explicitly track your large matrix/data files
          git lfs install
          git lfs track "*.pkl"
          git lfs track "*.dat"
          git lfs track "*.csv"
          
          # 4. Stage the generated .gitattributes file first
          git add .gitattributes
          
          # 5. Configure bot identity and stage the rest of the files
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # 6. Create a single, clean deployment commit
          git commit -m "Auto-Deployment: Fused matrices and architecture synchronized"
          
          # 7. Force push the LFS-tracked snapshot to Hugging Face
          git remote add hf https://sasuke96:${HF_TOKEN}@huggingface.co/spaces/sasuke96/hybrid_movie_recc_sasuke
          git push --force hf main
