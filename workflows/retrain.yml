name: Automated Hybrid Model Retraining

on:
  schedule:
    # Executes at 03:00 UTC every Sunday
    - cron: '0 3 * * 0'
  workflow_dispatch: # Permits manual execution via the GitHub Actions UI

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Authorization required to commit updated models to the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute ETL and Retraining Pipeline
        env:
          # Injects repository secrets securely into the runtime environment
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Initiating Data Fusion and Model Training..."
          python train.py

      - name: Commit and Push Updated Matrix Artifacts
        run: |
          # Configure standard GitHub Actions bot identity
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the newly generated .pkl files
          git add models/*.pkl
          
          # Commit and push only if the matrices have structurally changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Fused live Supabase ratings into latent space" && git push)
